spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/s_corner?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456789}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false

app:
  jwt:
    secret: ${JWT_SECRET:test-secret-for-ci-must-be-at-least-32-bytes-long}
  oauth:
    github:
      client-id: ""
      client-secret: ""
