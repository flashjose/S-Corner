server:
  port: ${SERVER_PORT:3001}

spring:
  application:
    name: s-corner-server

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/s_corner?useSSL=false&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456789}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  dictionary:
    local-enabled: ${DICT_LOCAL_ENABLED:true}
    remote-fallback: ${DICT_REMOTE_FALLBACK:true}

logging:
  level:
    com.scorner: info
    org.hibernate.SQL: warn
